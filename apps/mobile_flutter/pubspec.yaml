name: healthsphere_mobile
version: 0.1.0+1
description: HealthSphere Flutter mobile/tablet/wearable app scaffold.
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Home-screen widget bridge (Android AppWidget + iOS WidgetKit)
  home_widget: ^0.4.1
  # Local key/value store for persisting widget data between sessions
  shared_preferences: ^2.3.2
  # HTTP client for API calls from Flutter
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
