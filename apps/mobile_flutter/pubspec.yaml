name: healthsphere_mobile
version: 0.1.0+1
description: HealthSphere Flutter mobile/tablet/wearable app scaffold.
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Home-screen widget bridge (Android AppWidget + iOS WidgetKit)
  home_widget: ^0.4.1
  # Local key/value store for persisting widget data between sessions
  shared_preferences: ^2.3.2
  # HTTP client for API calls from Flutter
  http: ^1.2.2
  # Offline-first local SQLite database
  sqflite: ^2.3.3+1
  # File-system path utilities (needed by sqflite)
  path: ^1.9.0
  # Biometric authentication (Face ID, Touch ID, fingerprint)
  local_auth: ^2.3.0
  # GPS location (foreground + background tracking)
  geolocator: ^13.0.1
  # Camera-based barcode / QR scanner
  mobile_scanner: ^5.2.3
  # HealthKit (iOS) + Health Connect (Android) read/write
  health: ^11.0.0
  # Step counting via hardware pedometer sensor
  pedometer: ^4.0.3
  # Local push notifications (medication, water, workout reminders)
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
